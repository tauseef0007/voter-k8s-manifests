name: Build Push Update Manifest

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Remove Old Manifest Repo
      run: rm -rf voter-k8s-manifests

    - name: Checkout App Repo
      uses: actions/checkout@v4

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t tauseef0007/voterapp:${{ github.sha }} .

    - name: Push Docker Image
      run: |
        docker push tauseef0007/voterapp:${{ github.sha }}

    - name: Clone Manifest Repo
      run: |
        git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/tauseef0007/voter-k8s-manifests.git

    - name: Update Deployment Image
      run: |
        cd voter-k8s-manifests
        sed -i 's|image:.*|image: tauseef0007/voterapp:${{ github.sha }}|' deployment.yaml

    - name: Commit Changes
      run: |
        cd voter-k8s-manifests
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add .
        git commit -m "Updated image tag"

    - name: Push Changes
      run: |
        cd voter-k8s-manifests
        git push